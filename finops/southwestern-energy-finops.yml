meters:
  - name: counterparty_integration
    description: Placeholder meter; actual billable units track physical commodity
      movement, not per-API-call usage.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility is provided through nominations, allocation statements,
      and EDI exchanges defined in the counterparty agreement; there is no public
      usage API.
  - name: Allocation
    description: Costs are allocated against the contracting commercial / trading
      desk that owns the counterparty relationship.
  - name: Optimization
    description: Optimization is commodity-commercial (basis, transportation,
      hedging) rather than per-call API tuning.
  - name: Accountability
    description: Owned by the trading or midstream commercial team that contracts
      directly with the producer.
notes: No public per-call billing or FinOps surface; entry exists for catalog
  completeness only.
