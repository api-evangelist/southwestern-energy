aid: southwestern-energy
name: Southwestern Energy
description: >-
  Southwestern Energy Company (SWN) is one of the largest producers of natural gas in
  the United States, with exploration and production operations focused primarily on the
  Marcellus and Haynesville shales. In October 2024, Southwestern Energy completed a
  merger with Expand Energy Corporation (formerly Chesapeake Energy), though the SWN
  brand and investor relations infrastructure continues to operate under swn.com. As
  a Fortune 500 energy company, SWN focuses on responsible development of natural gas
  resources in the Appalachian Basin and Gulf Coast regions.
